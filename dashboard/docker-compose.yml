version: "3.8"
services:
  dashboard:
    build: .
    container_name: nyc-tlc-dashboard
    ports:
      - "8501:8501"
    volumes:
      - ../data/output:/app/data/output:ro
      - ../data/processed:/app/data/processed:ro
      - ./.env:/app/.env:ro
    environment:
      - AWS_DEFAULT_REGION=${AWS_REGION:-us-east-1}
    restart: unless-stopped
